[custom]
; ==========================================================
; 1. 代理分组 (Proxy Groups) 设置
; ==========================================================

; --- 基础策略组 ---
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🍃 应用净化`select`[]REJECT`[]DIRECT
custom_proxy_group=🛡️ 隐私防护`select`[]REJECT`[]DIRECT

; --- 独立 AI 平台 ---
custom_proxy_group=🤖 ChatGPT`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇨🇳 台湾节点`.*
custom_proxy_group=🤖 Gemini`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇨🇳 台湾节点`.*
custom_proxy_group=🤖 Claude`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`[]🇨🇳 台湾节点`.*
custom_proxy_group=🤖 Grok`select`[]🚀 节点选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 狮城节点`.*

; --- 社交与流媒体细分 ---
custom_proxy_group=🐦 Twitter`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=📘 Facebook`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=📷 Instagram`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=💬 WhatsApp`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🎵 TikTok`select`[]🚀 节点选择`[]♻️ 自动选择`.*

; --- 游戏平台细分 ---
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🎮 Epic`select`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🎮 EA`select`[]🎯 全球直连`[]🚀 节点选择`.*

; --- 财务与支付 (已增加 Wise 和 N26) ---
custom_proxy_group=💰 PayPal`select`[]🇺🇸 美国节点`[]🚀 节点选择`[]🎯 全球直连`.*
custom_proxy_group=🦉 Wise`select`[]🇺🇸 美国节点`[]🚀 节点选择`[]🎯 全球直连`.*
custom_proxy_group=🏦 N26`select`[]🇺🇸 美国节点`[]🚀 节点选择`[]🇪🇺 欧洲节点`[]🎯 全球直连`.*

; --- 常规流媒体与其他 ---
custom_proxy_group=✈️ Telegram`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点选择`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 节点选择`[]♻️ 自动选择`.*
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]♻️ 自动选择`.*

; --- 地区落地节点组 (新增欧洲节点组以备 N26 需要) ---
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|Hong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇨🇳 台湾节点`url-test`(台|TW|Tai)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日|JP|Japan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美|US|United States)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 狮城节点`url-test`(新|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(韩|KR|Korea)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇪🇺 欧洲节点`url-test`(英|法|德|欧|UK|FR|DE|EU)`http://www.gstatic.com/generate_204`300,,50


; ==========================================================
; 2. 独立自定义规则 (Custom Rules)
; ==========================================================
; Grok 独立规则
custom_rule=DOMAIN-SUFFIX,grok.com,🤖 Grok
custom_rule=DOMAIN-SUFFIX,x.ai,🤖 Grok

; N26 独立规则 (使用底层匹配防止远程规则库失效)
custom_rule=DOMAIN-SUFFIX,n26.com,🏦 N26
custom_rule=DOMAIN-SUFFIX,tech26.de,🏦 N26
custom_rule=DOMAIN-KEYWORD,n26,🏦 N26


