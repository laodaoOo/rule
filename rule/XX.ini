[custom]
; ==========================================================
; 1. 独立自定义规则 (Custom Rules) - 优先级最高，拦截在最前面
; ==========================================================
; Grok 独立规则
custom_rule=DOMAIN-SUFFIX,grok.com,🤖 Grok
custom_rule=DOMAIN-SUFFIX,x.ai,🤖 Grok

; N26 独立规则
custom_rule=DOMAIN-SUFFIX,n26.com,🏦 N26
custom_rule=DOMAIN-SUFFIX,tech26.de,🏦 N26
custom_rule=DOMAIN-KEYWORD,n26,🏦 N26

; Wise 独立规则
custom_rule=DOMAIN-SUFFIX,transferwise.com,🦉 Wise
custom_rule=DOMAIN-SUFFIX,wise.net,🦉 Wise


; ==========================================================
; 2. 远程规则集 (Rulesets) - 顺序很重要，从上往下依次匹配
; ==========================================================

; --- 局域网直连与去广告 ---
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
